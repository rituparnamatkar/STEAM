<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEAM Curriculum Mindmap · Grades 5–10 · Learning Links Foundation</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Karla:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F6F8; --ink:#22303C; --ink-soft:#5B6B7A; --line:#C9D3DC; --card:#FFFFFF;
  --s:#1F9D6B; --t:#2F6FE4; --e:#E8842C; --a:#9B51C9; --m:#E14B7A;
  --g5:#1F9D6B; --g6:#2F6FE4; --g7:#E8842C; --g8:#9B51C9; --g9:#E14B7A; --g10:#12A5A5;
  --found:#5B6B7A; --rub:#B98A12;
  --disp:'Bricolage Grotesque',Verdana,system-ui,sans-serif;
  --body:'Karla',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--paper);color:var(--ink);overflow:hidden}
header{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:10px 16px;background:rgba(243,246,248,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);flex-wrap:wrap}
header h1{font-family:var(--disp);font-weight:800;font-size:17px;letter-spacing:-.01em;white-space:nowrap}
header h1 .steam span{display:inline-block;transform:translateY(0)}
.steam .cS{color:var(--s)}.steam .cT{color:var(--t)}.steam .cE{color:var(--e)}.steam .cA{color:var(--a)}.steam .cM{color:var(--m)}
header .sub{font-size:12px;color:var(--ink-soft);white-space:nowrap}
#search{margin-left:auto;min-width:180px;flex:0 1 260px;padding:7px 12px;border:1.5px solid var(--line);border-radius:20px;
  font-family:var(--body);font-size:13px;background:#fff;color:var(--ink);outline:none}
#search:focus{border-color:var(--t)}
.btns{display:flex;gap:6px}
.btns button{font-family:var(--body);font-weight:700;font-size:12px;padding:7px 12px;border-radius:16px;border:1.5px solid var(--line);
  background:#fff;color:var(--ink);cursor:pointer}
.btns button:hover{border-color:var(--ink-soft)}
.btns button:focus-visible,#search:focus-visible{outline:2px solid var(--t);outline-offset:2px}
#canvasWrap{position:absolute;inset:0;top:0;cursor:grab}
#canvasWrap.dragging{cursor:grabbing}
svg{width:100%;height:100%;display:block}
.link{fill:none;stroke-width:2.2px;opacity:.55}
.nodeBox{cursor:pointer}
.nodeDiv{font-family:var(--body);background:var(--card);border:2px solid var(--nc,var(--ink-soft));border-radius:14px;
  padding:7px 12px;font-size:13px;line-height:1.25;color:var(--ink);box-shadow:0 2px 5px rgba(34,48,60,.10);
  display:flex;align-items:center;gap:8px;height:100%;overflow:hidden}
.nodeDiv .cap{font-weight:700;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.nodeDiv .tag{font-size:10px;font-weight:700;color:#fff;background:var(--nc,var(--ink-soft));border-radius:8px;padding:2px 7px;white-space:nowrap}
.nodeDiv .tog{margin-left:auto;font-weight:800;color:var(--nc,var(--ink-soft));font-size:14px;flex:none}
.nodeDiv.depth0{background:var(--ink);color:#fff;border-color:var(--ink);border-radius:22px;padding:12px 18px}
.nodeDiv.depth0 .cap{font-family:var(--disp);font-size:16px;-webkit-line-clamp:3}
.nodeDiv.depth1 .cap{font-family:var(--disp);font-size:14px}
.nodeDiv.selected{box-shadow:0 0 0 3px color-mix(in srgb,var(--nc,var(--ink)) 35%,transparent),0 3px 8px rgba(34,48,60,.18)}
.nodeDiv.hit{background:#FFF7DA}
.nodeDiv:hover{box-shadow:0 3px 9px rgba(34,48,60,.2)}
#panel{position:fixed;top:58px;right:0;bottom:0;width:390px;max-width:92vw;background:#fff;border-left:1px solid var(--line);
  z-index:30;transform:translateX(105%);transition:transform .25s ease;overflow-y:auto;padding:20px 22px 40px;box-shadow:-6px 0 20px rgba(34,48,60,.08)}
#panel.open{transform:none}
#panel .eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pc,var(--ink-soft))}
#panel h2{font-family:var(--disp);font-weight:800;font-size:21px;margin:4px 0 12px;line-height:1.15}
#panel p{font-size:13.5px;line-height:1.55;color:var(--ink);margin-bottom:12px}
#panel h3{font-family:var(--disp);font-size:13px;font-weight:700;margin:16px 0 6px;color:var(--ink)}
#panel ul{margin:0 0 12px 18px}
#panel li{font-size:13px;line-height:1.5;margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:12px;background:color-mix(in srgb,var(--pc,var(--ink-soft)) 12%,#fff);
  color:var(--pc,var(--ink-soft));border:1px solid color-mix(in srgb,var(--pc,var(--ink-soft)) 35%,#fff)}
.steamRow{display:flex;gap:8px;margin:4px 0 10px;align-items:flex-start}
.steamRow .letter{flex:none;width:26px;height:26px;border-radius:8px;color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(--disp)}
.steamRow div.txt{font-size:12.5px;line-height:1.45;color:var(--ink)}
.lvl{border:1.5px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden}
.lvl summary{cursor:pointer;padding:9px 12px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;list-style:none}
.lvl summary::-webkit-details-marker{display:none}
.lvl summary .n{flex:none;width:22px;height:22px;border-radius:50%;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:800}
.lvl .body{padding:0 12px 11px;font-size:12.5px;line-height:1.5;color:var(--ink)}
.note{font-size:12px;background:#F0F4F8;border-left:3px solid var(--pc,var(--ink-soft));padding:8px 10px;border-radius:0 8px 8px 0;color:var(--ink-soft);margin-top:14px;line-height:1.5}
#closePanel{position:absolute;top:14px;right:14px;border:none;background:#EFF3F6;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;color:var(--ink-soft);font-weight:700}
#legend{position:fixed;left:14px;bottom:14px;z-index:25;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:14px;padding:10px 14px;font-size:11.5px;color:var(--ink-soft);line-height:1.9;box-shadow:0 2px 8px rgba(34,48,60,.08)}
#legend b{color:var(--ink)}
#legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
#zoomCtl{position:fixed;right:14px;bottom:14px;z-index:25;display:flex;flex-direction:column;gap:6px}
#panel.open ~ #zoomCtl{right:404px}
#zoomCtl button{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:16px;font-weight:800;cursor:pointer;color:var(--ink)}
@media(max-width:760px){
  header{gap:8px}
  header .sub{display:none}
  #panel{top:auto;left:0;right:0;width:100%;max-width:none;height:62%;border-left:none;border-top:1px solid var(--line);transform:translateY(105%)}
  #panel.open{transform:none}
  #panel.open ~ #zoomCtl{right:14px;bottom:calc(62% + 12px)}
  #legend{display:none}
}
@media(prefers-reduced-motion:reduce){#panel{transition:none}}
</style>
</head>
<body>
<header>
  <h1><span class="steam"><span class="cS">S</span><span class="cT">T</span><span class="cE">E</span><span class="cA">A</span><span class="cM">M</span></span> Curriculum Mindmap</h1>
  <span class="sub">Grades 5–10 · Learning Links Foundation · Facilitator view</span>
  <input id="search" type="search" placeholder="Search modules, concepts… (e.g. ‘pulley’, ‘solar’)" aria-label="Search the mindmap">
  <div class="btns">
    <button id="bOverview" title="Show grades only">Overview</button>
    <button id="bModules" title="Show all modules">Modules</button>
    <button id="bAll" title="Expand everything">Everything</button>
    <button id="bFit" title="Fit map to screen">Fit</button>
  </div>
</header>

<div id="canvasWrap"><svg id="svg" role="tree" aria-label="STEAM curriculum mindmap"><g id="viewport"><g id="links"></g><g id="nodes"></g></g></svg></div>

<aside id="panel" aria-live="polite"><button id="closePanel" aria-label="Close details">✕</button><div id="panelBody"></div></aside>

<div id="legend">
  <b>How to use</b><br>
  Click a node → expand & see details<br>
  Drag to pan · scroll / buttons to zoom<br>
  <span class="sw" style="background:var(--rub)"></span>Rubric = 5 criteria × 4 levels
</div>

<div id="zoomCtl">
  <button id="zIn" aria-label="Zoom in">+</button>
  <button id="zOut" aria-label="Zoom out">−</button>
</div>

<script>
/* ============ DATA ============ */
const STEAM_COLORS={S:'var(--s)',T:'var(--t)',E:'var(--e)',A:'var(--a)',M:'var(--m)'};
const LVL_COLORS=['#1F9D6B','#2F6FE4','#E8842C','#E14B7A']; // 4,3,2,1

const CRITERIA=[
 ['Critical Thinking & Problem Solving',[
  'Deep grasp of the science behind the model. Independently diagnoses faults, tests fixes systematically, and uses evidence from repeated trials to explain why one design outperforms another. Applies the same reasoning confidently in the challenge.',
  'Explains most of the key ideas behind the model. Identifies common issues with some support and uses test results to suggest practical, workable improvements.',
  'Describes the build at a basic level, but explanations of *why* it works are incomplete. Notices some problems but needs facilitator guidance to find causes or improve the design.',
  'Struggles to explain how or why the model works. Rarely spots construction errors independently and needs continuous support to test or correct the design.']],
 ['Creativity',[
  'Outstanding originality — goes well beyond the sample model with purposeful design, decoration and bold experimentation while keeping the model functional. The final piece feels like a real prototype.',
  'Meaningful personalization in colour, layout or design; tries a few original ideas beyond the class model. Clear individual style and effort.',
  'Mostly follows the sample model. Small changes in colour or decoration, often made with help; modest experimentation.',
  'Copies the example with little personal input or experimentation. Depends heavily on the facilitator for design choices.']],
 ['Collaboration',[
  'Exceptional teamwork across brainstorming, building, testing and improving. Shares fairly, listens carefully, supports teammates, and helps the group refine the design after every trial.',
  'Contributes meaningfully to most stages; shares tasks, joins discussion, accepts feedback. Needs only occasional reminders.',
  'Participates inconsistently — contributes to some parts but relies on others for planning or completion; needs reminders to stay involved.',
  'Limited participation. Rarely contributes ideas, depends on others to finish the work, and needs frequent support to engage.']],
 ['Communication',[
  'Explains ideas, observations and reasoning very clearly with accurate scientific vocabulary. Records observations neatly and presents conclusions in a logical, confident way.',
  'Mostly clear explanations using several terms correctly; can describe the build and the improvements made. Presentation is organized and understandable.',
  'Short, unclear or incomplete explanations; vocabulary used inconsistently. Needs prompting to describe reflections or decisions.',
  'Vague or inaccurate responses; rarely uses technical vocabulary correctly. Needs significant support to communicate ideas.']],
 ['Technical Literacy',[
  'Precise, safe and independent build. Tests accurately, records results properly, and uses the data to guide the next improvement. Can explain how each change affects performance.',
  'Builds a functional model with minor support; reasonable accuracy in tools and measurement; can try a variation with some guidance.',
  'Needs regular support to complete the build; struggles with precision; understands test-and-retest but cannot always apply it independently.',
  'Difficulty building independently; cannot connect construction steps to how the model performs; needs continuous support throughout.']]
];

function mod(name,build,concepts,steam,rubric){return{name,type:'module',build,concepts,steam,rubric,children:[]};}

const DATA={
name:'LLF STEAM Program\nGrades 5–10',type:'root',color:'var(--found)',
detail:{intro:'An experiential, hands-on STEAM curriculum by Learning Links Foundation. Every module follows the same learning cycle — Experience → Analysis → Reflection → Real-world connection — and is assessed with a common 5-criteria rubric. Click any branch to explore.',},
children:[
{name:'Program Foundations',type:'section',color:'var(--found)',children:[
  {name:'Learning Cycle',type:'topic',detail:{intro:'The heartbeat of every session. Learning is treated as a cycle, not a lecture:',list:['Experience — students build and try a DIY model first','Analysis — they test, measure and compare results','Reflection — guided questions surface the “why”','Real-world connection — the concept is linked to life outside class'],note:'Students find facts rather than memorize them — the aim is the next generation of technologists, innovators, designers and engineers.'}},
  {name:'Aims & Objectives',type:'topic',detail:{intro:'What the program is trying to grow in every learner:',list:['Build higher-order thinking and STEAM skills','Turn ideas into reality through research, modelling and prototyping','Connect core subjects to the real world — a “big picture” that boosts classroom engagement','Think beyond the boundaries of subjects','Build an innovative, entrepreneurial mindset via design thinking and experiential learning']}},
  {name:'Session Flow (≈240 min)',type:'topic',detail:{intro:'Every module follows the same rhythm. Timings are indicative — you have flexibility:',list:['Introduction · 20 min','Vocabulary · 5 min','Did you know? · 5 min','Warm-up · 30 min','Main Activity · 60 min','Extension Activity · 45 min','Understand the Challenge & plan materials · 15 min','Challenge · 60 min'],note:'“Explore More” questions are optional take-home explorations — encourage students to continue the learning beyond class.'}},
  {name:'Facilitation Tips',type:'topic',detail:{intro:'From the facilitator notes in every module:',list:['Read the whole session before class — and try the activities yourself first','Add extra videos or visual aids during the introduction','Have all materials ready before the session','Extension & challenge materials are open-ended — discuss and arrange them with students in advance','The curriculum is self-exploratory: play a facilitator role, not a lecturer role','Students work best in groups of 3','Use “Explore More” to keep curiosity going after class']}},
]},
{name:'Grade 5',type:'grade',color:'var(--g5)',children:[
  mod('Stairway to Innovation','A working cardboard escalator / conveyor model.',['Pulleys & conveyor belts','Friction & gravity','Balance and stability','Load movement'],
    {S:'Physics of motion — how steps move and forces lift loads',T:'Smart-technology ideas; tools for building & testing',E:'Rails, pulleys and supports designed for smooth movement',A:'Step patterns, side panels and prototype presentation',M:'Measuring, angles and alignment for a balanced build'},'Sheet M1'),
  mod('Parachute Pioneers','A mini parachute with canopy, suspension lines and payload.',['Gravity vs. air resistance','Canopy size, shape & material','Descent speed & stability','Payload weight'],
    {S:'Aerodynamics — the forces acting on a falling parachute',T:'Tools for cutting, threading and testing drops',E:'Canopy, line and payload design that deploys reliably',A:'Canopy decoration, colour and shape choices',M:'Line lengths, canopy area and timing descents'},'Sheet M2'),
  mod('Solar AquaNauts','A solar-powered water pump system.',['Photovoltaic cells','Energy conversion (light → electric → mechanical)','Fluid dynamics & flow rate','Renewable energy'],
    {S:'How sunlight becomes electricity and moves water',T:'Solar panel, motor and pump components',E:'Wiring, tubing and panel positioning for best flow',A:'Presenting the system as a real-world solution',M:'Measuring flow rates and comparing test data'},'Sheet M3'),
  mod('Botanical Bliss','A self-sustaining terrarium ecosystem.',['Ecosystems & interdependence','Closed-loop nutrient cycling','The water cycle','Plants, soil & moisture'],
    {S:'Living systems in action inside a sealed world',T:'LED lighting and observation tools',E:'Layering soil, drainage and plants so the system sustains itself',A:'Designing a beautiful miniature landscape',M:'Proportions of layers, moisture and observation logs'},null),
  mod('Shadow Tales','A shadow theatre exploring light and storytelling.',['Light travels in straight lines','Opaque, transparent & translucent','How shadows form & change','Light sources & distance'],
    {S:'Behaviour of light and how objects block it',T:'Torches / light sources and screen setup',E:'Building puppets and a stage that cast crisp shadows',A:'Story, character and shadow-art design',M:'Distance, size and angle of shadows'},null),
]},
{name:'Grade 6',type:'grade',color:'var(--g6)',children:[
  mod('Aim for the Stars','A straw rocket — finless vs. finned flight tests.',['Newton’s 1st law','Drag & air resistance','Fins & flight stability','Launch force and angle'],
    {S:'Physics of flight — why fins keep a rocket straight',T:'Scissors, tape and launch tools',E:'Fin shape, placement and rocket length tuned by testing',A:'Rocket body design, colours and naming',M:'Measuring launch distances and comparing trials'},'Sheet M1'),

  mod('Strings of Stars','Constellation models & string-art zodiac constellations.',['Stars & constellations','The 12 zodiacs','Light and patterns in the night sky'],

  mod('Ancient War Machine – 1','A catapult inspired by ancient engineering.',['Levers & tension','Stored (elastic) energy','Projectile motion','Accuracy & trajectory'],
    {S:'Forces and energy release in a launch',T:'Simple machines and DIY tools',E:'Frame, arm and tension design for range',A:'Historical design and decoration',M:'Angles, distances and hit accuracy'},null),
  mod('Glowing Papers (AWS variant)','A light-up paper-circuit artwork.',['Conductivity & polarity','Open, closed & short circuits','Parallel circuits','LEDs'],
    {S:'How electricity flows through a circuit',T:'LEDs, copper tape and batteries',E:'Fault-finding and reliable circuit layout',A:'Tech-art: light integrated into an artwork',M:'Circuit layout planning and component placement'},'Sheet V2 · AWS program only'),

{name:'Grade 7',type:'grade',color:'var(--g7)',children:[
  mod('Magic in Motion','A paper roller coaster.',['Conservation of energy','Potential ↔ kinetic energy','Loops, hills & momentum','Friction losses'],
    {S:'Energy transformation as the marble travels the track',T:'Cutting and construction tools',E:'Track supports, loops and smooth transitions',A:'Themed coaster design',M:'Heights, curves and speed relationships'},'Sheet M1'),
  mod('Bridge the Gap','A hydraulic (syringe-powered) bridge.',['Hydraulics & Pascal’s law','Pressure transmission','Hinges & moving parts','Structural strength'],
    {S:'Physics of fluids moving the bridge deck',T:'Syringes and tubing as the hydraulic system',E:'Base, hinge and lifting mechanism design',A:'Bridge aesthetics and finishing',M:'Force, dimensions and syringe ratios'},null),
  mod('Fascinating Fractals','A Sierpinski triangle & fractal explorations.',['Self-similarity','Iteration & patterns','Fractals in nature','Geometry'],
    {S:'Fractal patterns found across nature',T:'Drawing / construction tools; digital fractal explorers',E:'Precise iterative construction',A:'Fractal art — math made beautiful',M:'The core of the module: triangles, ratios, infinite patterns'},'Sheet M3'),
  mod('Happy Hydroponics','A soil-free plant growing setup.',['Hydroponics & hydroculture','Mineral nutrient solutions','What plants really need','Sustainable farming'],
    {S:'Plant biology without soil',T:'The hydroponic apparatus itself',E:'Designing a working grow system',A:'Presentation of the growing station',M:'Nutrient measurement and growth tracking'},'Sheet M4'),
  mod('Shaky Science','A seismograph & earthquake-resistant structures.',['Earthquakes & seismic waves','How seismographs work','Structural stability','Earthquake-resistant design'],
    {S:'Ground shaking and how we measure it',T:'DIY seismograph build',E:'Testing structures that survive the shake',A:'Model city / structure presentation',M:'Comparing shake results across designs'},null),
  mod('Night Sense (AWS variant)','An automatic streetlight (LDR + transistor circuit).',['Light-dependent resistance','Transistor as a switch','Sensing & automation','Circuit troubleshooting'],
    {S:'How light levels change resistance and switch the LED',T:'LDR, transistor, resistor, LED components',E:'A reliable auto-on / auto-off circuit',A:'Streetlight model design',M:'Choosing resistor values; comparing trial results'},'Sheet V2 · AWS program only'),

    {S:'The science of artificial body parts',T:'Cutters, straws/strings — the “tendon” tech',E:'Finger articulation that actually grabs',A:'A lifelike, presentable hand design',M:'Finger lengths, joint spacing and proportion'},'Sheet M1'),
  mod('Whirling Wind','A working windmill (+ waterwheel discussion).',['Wind energy','Blade design & rotation','Renewable energy','Energy conversion'],

  mod('Ancient War Machine','A catapult / siege engine (advanced).',['Levers & mechanical advantage','Elastic potential energy','Projectile motion & trajectory'],
    {S:'Launch forces and energy release',T:'Simple machines assembled from DIY parts',E:'Frame strength and arm tuning for range',A:'Historical engineering aesthetics',M:'Launch angles, distances and accuracy data'},'Sheet M3'),
  mod('Moving with Magnets','An electromagnetic dancer + homopolar motor.',['Electromagnetism','Magnetic poles & fields','Homopolar motors','Current & motion'],
    {S:'How electricity and magnetism create movement',T:'Battery, magnet and wire — a motor in miniature',E:'Getting the dancer / motor to move reliably',A:'The “dancer” — motion as performance',M:'Coil turns, sizes and spin observations'},null),
  mod('Keep You in Suspens(ion)','A suspension bridge + movable bridge challenge.',['Tension & compression','Cables & load distribution','Bridge engineering','Stability in wind/quakes'],
    {S:'Forces that hold a bridge up',T:'Research tools; construction materials',E:'Towers, cables and deck working together',A:'Bridge design harmonized with its setting',M:'Spans, cable angles and load estimates'},null),
  mod('Light up the Lanterns (AWS variant)','A paper-circuit lantern.',['Simple circuits','LEDs & polarity','Conductive paths'],
    {S:'Electricity flow in a decorative circuit',T:'LEDs, copper tape, battery',E:'A lantern that reliably lights',A:'Lantern craft and glow design',M:'Layout planning of the circuit path'},'Sheet V2 · AWS program only'),
]},
{name:'Grade 9',type:'grade',color:'var(--g9)',children:[
  mod('Static Sparks','A DIY electroscope.',['Static electricity & charge transfer','Electrostatic induction','Attraction & repulsion','Detecting charge'],
    {S:'Electron transfer and the behaviour of charges',T:'Everyday materials become a scientific instrument',E:'A sensitive, working charge detector',A:'Instrument presentation and demonstration',M:'Observing and comparing deflection across trials'},'Sheet M1'),
  mod('Skyward Lift Spectacle','A vertical lift bridge model.',['Forces & balance','Counterweights','Pulleys & lifting mechanisms','Weight distribution'],
    {S:'Mechanics behind a bridge that rises straight up',T:'DIY + digital research tools (CAD as extension)',E:'Pulleys, counterweights and structural stability',A:'A bridge that fits its environment beautifully',M:'Measurements, angles and counterweight ratios'},'Sheet M2'),
  mod('Whirligig Wonders','A spinning whirligig toy.',['Air resistance','Centrifugal force','Momentum & rotation'],
    {S:'The physics of spin and twirl',T:'Simple build and test tools',E:'Balanced blades that spin true',A:'Whirligig as kinetic folk art',M:'Blade dimensions and spin comparisons'},'Sheet M3'),
  mod('Spectra Quest','Light-spectrum and optics explorations.',['Dispersion & refraction','The visible spectrum','Wavelength ↔ colour','Optics'],
    {S:'How white light splits into colours',T:'Prisms / optical apparatus',E:'Setting up reliable optical demonstrations',A:'The spectrum itself — science as colour',M:'Angles of refraction and spectrum measurements'},null),
  mod('Magic Cup','A cup that balances via air pressure.',['Air pressure','Fluid dynamics','Equilibrium','Variables & testing'],
    {S:'Pressure differences behind the “magic”',T:'Simple apparatus, systematic testing',E:'Tuning parameters until equilibrium holds',A:'The reveal — presenting the trick and the truth',M:'Testing how each variable changes the outcome'},null),
]},
{name:'Grade 10',type:'grade',color:'var(--g10)',children:[
  mod('Whiz Wings','A drone-wing / flight model.',['Lift, thrust & drag','Aerodynamics','Design ↔ flight performance'],
    {S:'How drones and wings achieve flight',T:'Flight-model components and test rigs',E:'Wing/frame design iterated for performance',A:'Sleek, purposeful aircraft design',M:'Flight distances, angles and performance data'},'Sheet M1'),
  mod('Solar Cruiser','A solar-powered car.',['Photovoltaic effect','Panel efficiency','Energy conversion & transmission'],
    {S:'Sunlight → electricity → motion',T:'Solar panel, motor, chassis integration',E:'Drivetrain and panel placement for speed',A:'Vehicle body design',M:'Speed trials, efficiency and comparisons'},'Sheet M2'),
  mod('Beat Master','A multi-piece drum kit.',['Sound waves & vibration','Acoustics & resonance','Material ↔ sound relationships'],
    {S:'How sound travels, resonates and interacts with materials',T:'Selecting components for the right sound',E:'A playable, tuned multi-drum kit',A:'The kit as a real musical instrument',M:'Sizes and tensions mapped to pitch'},'Sheet M3'),
  mod('Velocity Voyager','A chemical-reaction rocket (baking soda + vinegar).',['Air pressure & propulsion','Chemical reactions (acid + base)','Thrust & launch dynamics'],
    {S:'Gas pressure from a chemical reaction launches the rocket',T:'Launch apparatus and safety setup',E:'Rocket + launcher engineered for height',A:'Rocket styling and mission identity',M:'Reactant quantities vs. launch performance'},null),
  mod('Hydro Grip','A hydraulic gripper arm.',['Fluid dynamics','Pascal’s law & pressure','Closed hydraulic systems','Mechanical grip'],
    {S:'Uniform pressure in a confined fluid does the work',T:'Syringes and tubing as hydraulics',E:'A gripper that lifts and holds',A:'Arm design and demonstration',M:'Syringe ratios and force estimation'},null),
]},
{name:'Assessment Rubric',type:'section',color:'var(--rub)',
 detail:{intro:'Every module is assessed on the same five 21st-century-skill criteria, each on a 4-level scale: Excellent (4) · Good (3) · Satisfactory (2) · Needs Improvement (1). The Excel workbooks (STEAM_Connection_Grade5–10.xlsx) contain the full module-specific wording — one sheet per module.',list:['Observe students across the whole session: warm-up, main activity, extension and challenge','Descriptors reference the specific model, so score against what students actually built and explained','Outcomes vary student to student — the rubric tracks growth, not just the final model'],note:'Click a criterion below to see the 4-level pattern used across all modules.'},
 children:CRITERIA.map(function(c){return{name:c[0],type:'criterion',levels:c[1],children:[]};})},
]};

/* ============ STATE & TREE PREP ============ */
let uid=0;
function prep(n,depth,color,parent){
  n.id='n'+(uid++); n.depth=depth; n.parent=parent;
  n.color=n.color||color||'var(--ink-soft)';
  (n.children||[]).forEach(c=>prep(c,depth+1,n.color,n));
}
prep(DATA,0,null,null);

const expanded=new Set([DATA.id]);
let selected=null, hits=new Set();
let scale=1, tx=80, ty=0;

const NODE_W=[250,168,196,200], NODE_H=[74,46,50,42], GAP_X=[70,60,55,55], GAP_Y=10;
function nw(n){return NODE_W[Math.min(n.depth,3)];}
function nh(n){return NODE_H[Math.min(n.depth,3)];}

function visChildren(n){return expanded.has(n.id)?(n.children||[]):[];}
function layout(){
  function h(n){const c=visChildren(n);if(!c.length)return nh(n);
    let s=0;c.forEach(k=>s+=h(k));return Math.max(nh(n),s+(c.length-1)*GAP_Y);}
  const out=[];
  function place(n,x,top){
    const H=h(n); n.x=x; n.y=top+H/2-nh(n)/2; out.push(n);
    let cy=top; const c=visChildren(n);
    c.forEach(k=>{place(k,x+nw(n)+GAP_X[Math.min(n.depth,3)],cy);cy+=h(k)+GAP_Y;});
  }
  place(DATA,0,0);
  return out;
}

/* ============ RENDER ============ */
const svg=document.getElementById('svg'), vp=document.getElementById('viewport'),
      gL=document.getElementById('links'), gN=document.getElementById('nodes');
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function render(){
  const nodes=layout();
  gL.innerHTML=''; gN.innerHTML='';
  nodes.forEach(n=>{
    if(n.parent){
      const p=n.parent;
      const x1=p.x+nw(p), y1=p.y+nh(p)/2, x2=n.x, y2=n.y+nh(n)/2;
      const mx=(x1+x2)/2;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
      path.setAttribute('class','link');
      path.setAttribute('stroke',n.color.startsWith('var')?getComputedStyle(document.documentElement).getPropertyValue(n.color.slice(4,-1)):n.color);
      gL.appendChild(path);
    }
    const fo=document.createElementNS('http://www.w3.org/2000/svg','foreignObject');
    fo.setAttribute('x',n.x);fo.setAttribute('y',n.y);
    fo.setAttribute('width',nw(n));fo.setAttribute('height',nh(n));
    fo.classList.add('nodeBox');
    const hasKids=(n.children||[]).length>0;
    const tog=hasKids?`<span class="tog">${expanded.has(n.id)?'−':'+'}</span>`:'';
    const tag=n.type==='grade'?'':(n.type==='module'&&n.rubric?`<span class="tag">✓ rubric</span>`:'');
    fo.innerHTML=`<div class="nodeDiv depth${Math.min(n.depth,3)}${selected===n.id?' selected':''}${hits.has(n.id)?' hit':''}"
      style="--nc:${n.color}" role="treeitem" tabindex="0" aria-expanded="${hasKids?expanded.has(n.id):''}">
      <span class="cap">${esc(n.name).replace(/\n/g,'<br>')}</span>${tag}${tog}</div>`;
    const div=fo.firstElementChild;
    const act=e=>{e.stopPropagation();select(n);};
    div.addEventListener('click',act);
    div.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();act(e);}});
    gN.appendChild(fo);
  });
  vp.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);
}

function select(n){
  selected=n.id;
  if((n.children||[]).length){ expanded.has(n.id)?expanded.delete(n.id):expanded.add(n.id); }
  showPanel(n); render();
}

/* ============ DETAIL PANEL ============ */
const panel=document.getElementById('panel'), pBody=document.getElementById('panelBody');
document.getElementById('closePanel').onclick=()=>panel.classList.remove('open');

function showPanel(n){
  panel.style.setProperty('--pc',n.color);
  let h='';
  const crumb=[];let p=n.parent;while(p){crumb.unshift(p.name.split('\n')[0]);p=p.parent;}
  h+=`<div class="eyebrow">${esc(crumb.join(' · ')||'STEAM Program')}</div><h2>${esc(n.name).replace(/\n/g,' ')}</h2>`;

  if(n.type==='module'){
    h+=`<p><b>What students build:</b> ${esc(n.build)}</p>`;
    h+=`<h3>Core concepts</h3><div class="chips">`+n.concepts.map(c=>`<span class="chip">${esc(c)}</span>`).join('')+`</div>`;
    h+=`<h3>The STEAM connection</h3>`;
    for(const k of ['S','T','E','A','M']){
      h+=`<div class="steamRow"><span class="letter" style="background:${STEAM_COLORS[k]}">${k}</span><div class="txt">${esc(n.steam[k])}</div></div>`;
    }
    h+= n.rubric
      ? `<div class="note"><b>Rubric:</b> module-specific descriptors are in the Grade workbook (${esc(n.rubric)}) — 5 criteria × 4 levels. See the <b>Assessment Rubric</b> branch for the level pattern.</div>`
      : `<div class="note"><b>Rubric:</b> use the common 5-criteria pattern in the <b>Assessment Rubric</b> branch; adapt descriptors to this module’s model and vocabulary.</div>`;
  }
  else if(n.type==='criterion'){
    h+=`<p>The same pattern runs through every module’s rubric — only the model-specific details change. Open each level:</p>`;
    const names=['Excellent (4)','Good (3)','Satisfactory (2)','Needs Improvement (1)'];
    n.levels.forEach((txt,i)=>{
      h+=`<details class="lvl" ${i===0?'open':''}><summary><span class="n" style="background:${LVL_COLORS[i]}">${4-i}</span>${names[i]}</summary><div class="body">${esc(txt).replace(/\*(.+?)\*/g,'<i>$1</i>')}</div></details>`;
    });
    h+=`<div class="note">Tip: the jump from level 2 → 3 is usually <b>independence</b>; from 3 → 4 it’s <b>evidence-based reasoning</b> — students using trial results to justify their choices.</div>`;
  }
  else if(n.detail){
    if(n.detail.intro)h+=`<p>${esc(n.detail.intro)}</p>`;
    if(n.detail.list)h+=`<ul>`+n.detail.list.map(x=>`<li>${esc(x)}</li>`).join('')+`</ul>`;
    if(n.detail.note)h+=`<div class="note">${esc(n.detail.note)}</div>`;
  }
  else if(n.type==='grade'){
    const mods=n.children;
    h+=`<p>${mods.length} modules, each ≈240 minutes. Click a module on the map for its concepts and STEAM connections.</p><ul>`;
    mods.forEach(m=>h+=`<li><b>${esc(m.name)}</b> — ${esc(m.build)}</li>`);
    h+=`</ul><div class="note">Modules marked <b>✓ rubric</b> have a module-specific rubric sheet in STEAM_Connection_${esc(n.name.replace(' ',''))}.xlsx.</div>`;
  }
  else{ h+=`<p>Explore the branches on the map.</p>`; }
  pBody.innerHTML=h;
  panel.classList.add('open');
}

/* ============ PAN / ZOOM ============ */
const wrap=document.getElementById('canvasWrap');
let drag=null;
wrap.addEventListener('pointerdown',e=>{if(e.target.closest('.nodeDiv'))return;drag={x:e.clientX,y:e.clientY,tx,ty};wrap.classList.add('dragging');wrap.setPointerCapture(e.pointerId);});
wrap.addEventListener('pointermove',e=>{if(!drag)return;tx=drag.tx+(e.clientX-drag.x);ty=drag.ty+(e.clientY-drag.y);vp.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);});
wrap.addEventListener('pointerup',()=>{drag=null;wrap.classList.remove('dragging');});
wrap.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,e.deltaY<0?1.12:1/1.12);},{passive:false});
function zoomAt(cx,cy,f){
  const ns=Math.min(2.4,Math.max(.25,scale*f));
  tx=cx-(cx-tx)*ns/scale; ty=cy-(cy-ty)*ns/scale; scale=ns;
  vp.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);
}
document.getElementById('zIn').onclick=()=>zoomAt(innerWidth/2,innerHeight/2,1.2);
document.getElementById('zOut').onclick=()=>zoomAt(innerWidth/2,innerHeight/2,1/1.2);

function fit(){
  const nodes=layout();
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  nodes.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+nw(n));maxY=Math.max(maxY,n.y+nh(n));});
  const pad=50,availW=innerWidth-(panel.classList.contains('open')&&innerWidth>760?400:0)-pad*2,availH=innerHeight-70-pad*2;
  scale=Math.min(1.4,availW/(maxX-minX),availH/(maxY-minY));
  tx=pad-minX*scale; ty=70+pad-minY*scale+(availH-(maxY-minY)*scale)/2;
  render();
}

/* ============ EXPAND PRESETS & SEARCH ============ */
function setExpand(pred){expanded.clear();(function walk(n){if(pred(n))expanded.add(n.id);(n.children||[]).forEach(walk);})(DATA);fit();}
document.getElementById('bOverview').onclick=()=>setExpand(n=>n.depth===0);
document.getElementById('bModules').onclick=()=>setExpand(n=>n.depth<=1);
document.getElementById('bAll').onclick=()=>setExpand(()=>true);
document.getElementById('bFit').onclick=fit;

const searchBox=document.getElementById('search');
searchBox.addEventListener('input',()=>{
  const q=searchBox.value.trim().toLowerCase();
  hits.clear();
  if(q.length>=2){
    (function walk(n){
      const blob=[n.name,n.build||'',(n.concepts||[]).join(' '),n.steam?Object.values(n.steam).join(' '):''].join(' ').toLowerCase();
      if(blob.includes(q)){hits.add(n.id);let p=n.parent;while(p){expanded.add(p.id);p=p.parent;}}
      (n.children||[]).forEach(walk);
    })(DATA);
  }
  render();
});

/* ============ INIT ============ */
DATA.children.forEach(c=>expanded.add(c.id)); // show grades on load? keep grade branches collapsed, sections visible
expanded.clear(); expanded.add(DATA.id);
fit();
addEventListener('resize',fit);
</script>
</body>
