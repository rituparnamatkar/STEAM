        }

            padding: 20px;
        }

        }

        }

        }

            padding: 20px;
        }

            margin-bottom: 10px;

            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .sidebar h3:first-child {
            margin-top: 0;
        }
        
        .grade-item, .module-item, .criteria-item {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            background: white;
            border: 1px solid #ddd;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .grade-item {
            font-weight: 600;
            color: #667eea;
            border-left: 4px solid #667eea;
        }
        
        .grade-item.active {
            background: #667eea;
            color: white;
            border-left: 4px solid white;
        }
        
        .module-item {
            margin-left: 10px;
            background: #f0f0f0;
            border-left: 3px solid #764ba2;
        }
        
        .module-item.active {
            background: #764ba2;
            color: white;
            border-left: 3px solid white;
        }

            content: "☁ ";
            margin-right: 5px;
        }
        
        .criteria-item {
            margin-left: 20px;
            font-size: 0.85em;
            background: #fafafa;
        }
        
        .criteria-item.active {
            background: #667eea;
            color: white;
        }
        
        .viz-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: white;
        }

            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 5px;
        }

            color: #667eea;
            margin-bottom: 8px;
        }
        
        .activity-gist p {
            color: #333;
            line-height: 1.6;
            margin-bottom: 10px;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .concept-tag {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }

            background: #fafafa;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

            color: white;
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

            font-size: 1.1em;
            margin: 0;
        }
        
        .toggle-icon {
            font-size: 1.2em;
        }
        
        .criteria-content {
            display: none;
            padding: 20px;
        }
        
        .criteria-content.expanded {
            display: block;
        }

            border-radius: 5px;
            padding: 15px;
            border: 2px solid #ddd;

            background: #ecfdf5;
        }

            border-left: 5px solid #3b82f6;
            background: #eff6ff;
        }
        
        .level-2 {
            border-left: 5px solid #f59e0b;
            background: #fffbeb;
        }
        
        .level-1 {
            border-left: 5px solid #ef4444;
            background: #fef2f2;
        }
        
        .level-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

            background: #10b981;
            color: white;
        }
        
        .level-3 .level-badge {
            background: #3b82f6;
            color: white;
        }
        
        .level-2 .level-badge {
            background: #f59e0b;
            color: white;
        }
        
        .level-1 .level-badge {
            background: #ef4444;
            color: white;
        }

            color: #333;
            line-height: 1.7;
            margin-bottom: 12px;
            font-size: 0.95em;
        }

            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;

            color: #667eea;
            margin-bottom: 8px;

            border-bottom: 1px solid #e5e7eb;
            line-height: 1.6;

        }

            color: #666;

            margin-bottom: 20px;
            color: #333;
        }

            margin: 0 auto;
        }

            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            color: #78350f;

            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 600;

        // Render grades list
        function renderGradesList() {
            const gradesList = document.getElementById('grades-list');
            gradesList.innerHTML = '';
            
            Object.keys(rubricData).sort((a, b) => {
                return parseInt(a.split(' ')[1]) - parseInt(b.split(' ')[1]);
            }).forEach(grade => {
                const gradeDiv = document.createElement('div');
                gradeDiv.className = 'grade-item';
                gradeDiv.textContent = grade;
                gradeDiv.addEventListener('click', () => selectGrade(grade, gradeDiv));
                gradesList.appendChild(gradeDiv);
            });
        }

        // Select grade
        function selectGrade(grade, element) {
            document.querySelectorAll('.grade-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            renderModules(grade);
        }

        // Render modules
        function renderModules(grade) {
            const sidebar = document.querySelector('.sidebar');
            const existing = sidebar.querySelector('[data-modules]');
            if (existing) existing.remove();
            
            const modulesDiv = document.createElement('div');
            modulesDiv.setAttribute('data-modules', 'true');
            modulesDiv.innerHTML = '<h3>Modules</h3>';
            
            Object.keys(rubricData[grade]).forEach(module => {
                const moduleItem = document.createElement('div');
                moduleItem.className = 'module-item' + (rubricData[grade][module].aws ? ' aws' : '');
                moduleItem.textContent = module;
                moduleItem.addEventListener('click', () => selectModule(grade, module, moduleItem));
                modulesDiv.appendChild(moduleItem);
            });
            
            sidebar.appendChild(modulesDiv);
            renderContent(grade, Object.keys(rubricData[grade])[0], modulesDiv.querySelector('.module-item'));
        }

        // Select module
        function selectModule(grade, module, element) {
            document.querySelectorAll('.module-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            renderContent(grade, module, element);
        }

        // Render content
        function renderContent(grade, module, moduleElement) {
            const content = document.getElementById('content');
            const moduleData = rubricData[grade][module];
            
            let html = `
                <div class="grade-label">${grade}</div>
                <div class="module-label ${moduleData.aws ? 'aws' : ''}">${module} ${moduleData.aws ? '☁ (AWS Program)' : ''}</div>
                
                <div class="activity-gist">
                    <h3>📌 Activity Overview</h3>
                    <p>${moduleData.gist}</p>
                    <div class="key-concepts">
                        ${moduleData.concepts.map(c => `<span class="concept-tag">${c}</span>`).join('')}
                    </div>
                </div>
                
                <div class="instruction">
                    <strong>💡 How to use this guide:</strong> Click on each criterion below to see detailed scoring guidance. Level 4 is aspirational - it represents exceptional work that goes beyond expectations.
                </div>
            `;
            
            Object.keys(moduleData.criteria).forEach((criterion, idx) => {
                const levels = moduleData.criteria[criterion];
                html += `
                    <div class="criteria-section">
                        <div class="criteria-header" onclick="toggleCriteria(this)">
                            <h4>${criterion}</h4>
                            <span class="toggle-icon">▼</span>
                        </div>
                        <div class="criteria-content">
                            <div class="level-container level-4">
                                <div class="level-badge">⭐ Excellent (4) - ASPIRATIONAL</div>
                                <div class="descriptor">${levels['4_Excellent']}</div>
                                <div class="aspirational-note">This is the "wow" level - students exceed expectations and demonstrate mastery with nuance and sophistication.</div>
                            </div>
                            
                            <div class="level-container level-3">
                                <div class="level-badge">✓ Good (3)</div>
                                <div class="descriptor">${levels['3_Good']}</div>
                            </div>
                            
                            <div class="level-container level-2">
                                <div class="level-badge">~ Satisfactory (2)</div>
                                <div class="descriptor">${levels['2_Satisfactory']}</div>
                            </div>
                            
                            <div class="level-container level-1">
                                <div class="level-badge">✗ Needs Improvement (1)</div>
                                <div class="descriptor">${levels['1_NeedsImprovement']}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            content.innerHTML = html;
        }

        // Toggle criteria
        function toggleCriteria(header) {
            const content = header.nextElementSibling;
            content.classList.toggle('expanded');
            const icon = header.querySelector('.toggle-icon');
            icon.textContent = content.classList.contains('expanded') ? '▲' : '▼';
        }
